<div class="container my-5">
  <div class="row mb-4">
    <div class="col">
      <h2 class="text-capitalize text-danger">
        {{ categoryName.replace('_', ' ') }} Products
      </h2>
      <p class="text-muted">View all available products in this branch</p>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-danger" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="alert alert-danger" role="alert">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && products.length === 0 && !errorMessage" class="alert alert-warning text-center" role="alert">
    No products available in this category for this branch at the moment.
  </div>

  <div *ngIf="!isLoading && products.length > 0" class="row g-4">
    <div class="col-md-4 col-lg-3" *ngFor="let product of products">
      <div class="card h-100 shadow-sm border-0 product-card">
        <img [src]="product.imgUrl" class="card-img-top p-2 rounded" alt="Product Image">
        
        <div class="card-body d-flex flex-column">
          <h5 class="card-title text-dark fw-bold">{{ product.name }}</h5>
          <p class="card-text text-muted small flex-grow-1">{{ product.description }}</p>
          
          <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="text-success fw-bold fs-5">{{ product.price | currency:'EGP ':'code':'1.2-2' }}</span>
            <button class="btn btn-outline-danger btn-sm">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
